<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ground — IEC 60617
  Three horizontal lines decreasing in width
  Category: electrical reference
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 48 48"
     width="48" height="48">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Vertical lead -->
    <line x1="24" y1="4" x2="24" y2="18" stroke="#333" stroke-width="2"/>
    <!-- Ground bars (decreasing width) -->
    <line x1="10" y1="18" x2="38" y2="18" stroke="#333" stroke-width="2"/>
    <line x1="14" y1="24" x2="34" y2="24" stroke="#333" stroke-width="2"/>
    <line x1="18" y1="30" x2="30" y2="30" stroke="#333" stroke-width="2"/>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="gnd" cx="24" cy="2" r="3" fill="#4fc3f7" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="24" y="42" text-anchor="middle"
          font-family="Arial" font-size="8" fill="#333">GND</text>
  </g>

</svg>
