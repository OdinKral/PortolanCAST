<?xml version="1.0" encoding="UTF-8"?>
<!--
  Motor — IEC 60617
  Circle with "M" — fan motor, pump motor
  Category: electrical load
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 64 64"
     width="64" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <circle cx="32" cy="28" r="18" fill="none" stroke="#333" stroke-width="2"/>
    <text x="32" y="34" text-anchor="middle" font-family="Arial" font-size="16"
          font-weight="bold" fill="#333">M</text>
    <!-- Shaft line (right) -->
    <line x1="50" y1="28" x2="60" y2="28" stroke="#333" stroke-width="3"/>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="pwr" cx="32" cy="8" r="3" fill="#e53935" stroke="none"/>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="shaft" cx="62" cy="28" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="32" y="58" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">MTR-101</text>
  </g>

</svg>
