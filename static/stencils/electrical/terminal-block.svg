<?xml version="1.0" encoding="UTF-8"?>
<!--
  Terminal Block — wiring termination point
  Category: electrical infrastructure
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 48 48"
     width="48" height="48">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Terminal body -->
    <rect x="12" y="8" width="24" height="24" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Screw terminals (two dots) -->
    <circle cx="24" cy="14" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="22" y1="12" x2="26" y2="16" stroke="#333" stroke-width="1"/>
    <circle cx="24" cy="26" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="22" y1="24" x2="26" y2="28" stroke="#333" stroke-width="1"/>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="in" cx="24" cy="4" r="3" fill="#4fc3f7" stroke="none"/>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="out" cx="24" cy="36" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="24" y="46" text-anchor="middle"
          font-family="Arial" font-size="8" fill="#333">TB</text>
  </g>

</svg>
