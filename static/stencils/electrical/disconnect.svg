<?xml version="1.0" encoding="UTF-8"?>
<!--
  Disconnect Switch — IEC 60617
  Lock-out/tag-out point
  Category: electrical protection
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 48 64"
     width="48" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Line in -->
    <line x1="24" y1="4" x2="24" y2="20" stroke="#333" stroke-width="2"/>
    <!-- Pivot point -->
    <circle cx="24" cy="20" r="2.5" fill="#333" stroke="none"/>
    <!-- Switch blade (open — angled) -->
    <line x1="24" y1="20" x2="36" y2="36" stroke="#333" stroke-width="2.5"/>
    <!-- Fixed jaw -->
    <circle cx="24" cy="40" r="2.5" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Line out -->
    <line x1="24" y1="42" x2="24" y2="56" stroke="#333" stroke-width="2"/>
    <!-- Handle indicator -->
    <rect x="34" y="32" width="8" height="8" fill="none" stroke="#333" stroke-width="1.5" rx="1"/>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="line" cx="24" cy="2" r="3" fill="#e53935" stroke="none"/>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="load" cx="24" cy="58" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="24" y="64" text-anchor="middle"
          font-family="Arial" font-size="8" fill="#333">DS</text>
  </g>

</svg>
