<?xml version="1.0" encoding="UTF-8"?>
<!--
  Circuit Breaker — IEC 60617
  Category: electrical protection
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 48 64"
     width="48" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Line in (top) -->
    <line x1="24" y1="4" x2="24" y2="18" stroke="#333" stroke-width="2"/>
    <!-- Breaker contact (angled line = open position) -->
    <line x1="24" y1="18" x2="32" y2="34" stroke="#333" stroke-width="2.5"/>
    <!-- Fixed contact point -->
    <circle cx="24" cy="18" r="2.5" fill="#333" stroke="none"/>
    <!-- Trip mechanism (small X) -->
    <line x1="30" y1="22" x2="34" y2="26" stroke="#333" stroke-width="1.5"/>
    <line x1="34" y1="22" x2="30" y2="26" stroke="#333" stroke-width="1.5"/>
    <!-- Line out (bottom) -->
    <circle cx="24" cy="38" r="2.5" fill="#333" stroke="none"/>
    <line x1="24" y1="38" x2="24" y2="52" stroke="#333" stroke-width="2"/>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="line" cx="24" cy="2" r="3" fill="#e53935" stroke="none"/>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="load" cx="24" cy="54" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="24" y="62" text-anchor="middle"
          font-family="Arial" font-size="8" fill="#333">CB</text>
  </g>

</svg>
