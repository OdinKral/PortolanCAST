<?xml version="1.0" encoding="UTF-8"?>
<!--
  Transformer — IEC 60617
  Two coils (inductor loops) with core lines
  Category: electrical power
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 64 64"
     width="64" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Primary winding (left — 3 bumps) -->
    <path d="M 20,8 Q 8,14 20,20 Q 8,26 20,32 Q 8,38 20,44"
          fill="none" stroke="#333" stroke-width="2"/>
    <!-- Secondary winding (right — 3 bumps) -->
    <path d="M 44,8 Q 56,14 44,20 Q 56,26 44,32 Q 56,38 44,44"
          fill="none" stroke="#333" stroke-width="2"/>
    <!-- Core lines (two vertical lines between windings) -->
    <line x1="30" y1="6" x2="30" y2="46" stroke="#333" stroke-width="1.5"/>
    <line x1="34" y1="6" x2="34" y2="46" stroke="#333" stroke-width="1.5"/>
    <!-- Terminal leads -->
    <line x1="20" y1="8" x2="20" y2="2" stroke="#333" stroke-width="1.5"/>
    <line x1="20" y1="44" x2="20" y2="50" stroke="#333" stroke-width="1.5"/>
    <line x1="44" y1="8" x2="44" y2="2" stroke="#333" stroke-width="1.5"/>
    <line x1="44" y1="44" x2="44" y2="50" stroke="#333" stroke-width="1.5"/>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="pri-h" cx="20" cy="2" r="3" fill="#e53935" stroke="none"/>
    <circle id="pri-l" cx="20" cy="52" r="3" fill="#e53935" stroke="none"/>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="sec-h" cx="44" cy="2" r="3" fill="#ff7043" stroke="none"/>
    <circle id="sec-l" cx="44" cy="52" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="32" y="62" text-anchor="middle"
          font-family="Arial" font-size="8" fill="#333">XFMR</text>
  </g>

</svg>
