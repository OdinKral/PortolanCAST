<?xml version="1.0" encoding="UTF-8"?>
<!--
  Occupancy Sensor (OSS)
  Circle with PIR wave arcs
  Category: sensor (binary)
  Ports: output (right) — binary occupied/unoccupied
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 64 64"
     width="64" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <circle cx="32" cy="28" r="18" fill="none" stroke="#333" stroke-width="2"/>
    <!-- PIR detection arcs -->
    <path d="M 28,22 Q 32,18 36,22" fill="none" stroke="#333" stroke-width="1.5"/>
    <path d="M 25,26 Q 32,18 39,26" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Small filled dot (sensor eye) -->
    <circle cx="32" cy="32" r="3" fill="#333" stroke="none"/>
    <text x="32" y="42" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">OCC</text>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="out" cx="50" cy="28" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="port-power" inkscape:groupmode="layer" id="layer-port-power">
    <circle id="pwr" cx="32" cy="10" r="3" fill="#e53935" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="32" y="58" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">OSS-101</text>
  </g>

</svg>
