<?xml version="1.0" encoding="UTF-8"?>
<!--
  Chiller
  Rectangle with evaporator/condenser barrels
  Category: equipment (96x64)
  Ports: inputs (CHW return, CW return), outputs (CHW supply, CW supply), power, comm
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 96 64"
     width="96" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Compressor housing (center rectangle) -->
    <rect x="30" y="12" width="36" height="32" rx="2" ry="2"
          fill="none" stroke="#333" stroke-width="2"/>
    <text x="48" y="30" text-anchor="middle" font-family="Arial" font-size="8"
          font-weight="bold" fill="#333">COMP</text>

    <!-- Evaporator barrel (left — CHW) -->
    <rect x="4" y="16" width="20" height="12" rx="6" ry="6"
          fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="14" y="25" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">EVAP</text>

    <!-- Condenser barrel (right — CW) -->
    <rect x="72" y="16" width="20" height="12" rx="6" ry="6"
          fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="82" y="25" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">COND</text>

    <!-- Refrigerant lines between compressor and barrels -->
    <line x1="24" y1="22" x2="30" y2="22" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="66" y1="22" x2="72" y2="22" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- CHW pipe connections (bottom left) -->
    <line x1="8" y1="28" x2="8" y2="48" stroke="#333" stroke-width="1.5"/>
    <line x1="20" y1="28" x2="20" y2="48" stroke="#333" stroke-width="1.5"/>
    <text x="8" y="54" text-anchor="middle" font-family="Arial" font-size="5" fill="#666">CHWR</text>
    <text x="20" y="54" text-anchor="middle" font-family="Arial" font-size="5" fill="#666">CHWS</text>

    <!-- CW pipe connections (bottom right) -->
    <line x1="76" y1="28" x2="76" y2="48" stroke="#333" stroke-width="1.5"/>
    <line x1="88" y1="28" x2="88" y2="48" stroke="#333" stroke-width="1.5"/>
    <text x="76" y="54" text-anchor="middle" font-family="Arial" font-size="5" fill="#666">CWR</text>
    <text x="88" y="54" text-anchor="middle" font-family="Arial" font-size="5" fill="#666">CWS</text>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="chwr" cx="8" cy="50" r="3" fill="#4fc3f7" stroke="none"/>
    <circle id="cwr" cx="76" cy="50" r="3" fill="#4fc3f7" stroke="none"/>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="chws" cx="20" cy="50" r="3" fill="#ff7043" stroke="none"/>
    <circle id="cws" cx="88" cy="50" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="port-power" inkscape:groupmode="layer" id="layer-port-power">
    <circle id="pwr" cx="48" cy="8" r="3" fill="#e53935" stroke="none"/>
  </g>

  <g inkscape:label="port-comm" inkscape:groupmode="layer" id="layer-port-comm">
    <circle id="comm" cx="48" cy="48" r="3" fill="#ab47bc" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="48" y="62" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">CH-1</text>
  </g>

</svg>
