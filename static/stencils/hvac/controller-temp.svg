<?xml version="1.0" encoding="UTF-8"?>
<!--
  Temperature Controller (TIC)
  ISA-5.1: Circle with "TIC" — PID loop controller
  Category: controller
  Ports: input (left) — sensor signal, output (right) — command to actuator
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 64 64"
     width="64" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <circle cx="32" cy="28" r="18" fill="none" stroke="#333" stroke-width="2"/>
    <text x="32" y="33" text-anchor="middle" font-family="Arial" font-size="11"
          font-weight="bold" fill="#333">TIC</text>
    <!-- Horizontal divider line (ISA convention: top = measurement, bottom = function) -->
    <line x1="14" y1="22" x2="50" y2="22" stroke="#333" stroke-width="1"/>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="in1" cx="14" cy="28" r="3" fill="#4fc3f7" stroke="none"/>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="out" cx="50" cy="28" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="32" y="58" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">TIC-101</text>
  </g>

</svg>
