<?xml version="1.0" encoding="UTF-8"?>
<!--
  Air Handling Unit (AHU) — schematic cross-section
  Shows: OA damper, filter, coils, fan, SA duct
  Category: equipment (96x64 — wider box)
  Ports: inputs (left — OA/RA), output (right — SA), power (top), comm (bottom)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 96 64"
     width="96" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- AHU casing -->
    <rect x="8" y="10" width="80" height="36" fill="none" stroke="#333" stroke-width="2"/>

    <!-- OA damper (left — two diagonal lines) -->
    <line x1="16" y1="14" x2="16" y2="42" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="14" y1="22" x2="18" y2="30" stroke="#333" stroke-width="1.5"/>
    <line x1="14" y1="30" x2="18" y2="38" stroke="#333" stroke-width="1.5"/>

    <!-- Filter (zigzag) -->
    <path d="M 28,14 L 30,18 L 26,22 L 30,26 L 26,30 L 30,34 L 26,38 L 28,42"
          fill="none" stroke="#333" stroke-width="1.5"/>

    <!-- Cooling coil (wavy vertical line with fins) -->
    <line x1="42" y1="14" x2="42" y2="42" stroke="#333" stroke-width="1.5"/>
    <line x1="39" y1="18" x2="45" y2="18" stroke="#333" stroke-width="1"/>
    <line x1="39" y1="24" x2="45" y2="24" stroke="#333" stroke-width="1"/>
    <line x1="39" y1="30" x2="45" y2="30" stroke="#333" stroke-width="1"/>
    <line x1="39" y1="36" x2="45" y2="36" stroke="#333" stroke-width="1"/>
    <text x="42" y="48" text-anchor="middle" font-family="Arial" font-size="5" fill="#666">CC</text>

    <!-- Heating coil -->
    <line x1="54" y1="14" x2="54" y2="42" stroke="#333" stroke-width="1.5"/>
    <line x1="51" y1="18" x2="57" y2="18" stroke="#333" stroke-width="1"/>
    <line x1="51" y1="24" x2="57" y2="24" stroke="#333" stroke-width="1"/>
    <line x1="51" y1="30" x2="57" y2="30" stroke="#333" stroke-width="1"/>
    <line x1="51" y1="36" x2="57" y2="36" stroke="#333" stroke-width="1"/>
    <text x="54" y="48" text-anchor="middle" font-family="Arial" font-size="5" fill="#666">HC</text>

    <!-- Supply fan (small circle with blade) -->
    <circle cx="72" cy="28" r="10" fill="none" stroke="#333" stroke-width="1.5"/>
    <path d="M 72,28 Q 76,20 80,24" fill="none" stroke="#333" stroke-width="1"/>
    <path d="M 72,28 Q 66,24 66,30" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="72" cy="28" r="2" fill="#333" stroke="none"/>

    <!-- Airflow arrow -->
    <line x1="2" y1="28" x2="8" y2="28" stroke="#333" stroke-width="1.5"/>
    <polygon points="5,25 2,28 5,31" fill="#333" stroke="none"/>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="oa" cx="2" cy="20" r="3" fill="#4fc3f7" stroke="none"/>
    <circle id="ra" cx="2" cy="36" r="3" fill="#4fc3f7" stroke="none"/>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="sa" cx="94" cy="28" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="port-power" inkscape:groupmode="layer" id="layer-port-power">
    <circle id="pwr" cx="72" cy="6" r="3" fill="#e53935" stroke="none"/>
  </g>

  <g inkscape:label="port-comm" inkscape:groupmode="layer" id="layer-port-comm">
    <circle id="comm" cx="48" cy="52" r="3" fill="#ab47bc" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="48" y="62" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">AHU-1</text>
  </g>

</svg>
