<?xml version="1.0" encoding="UTF-8"?>
<!--
  Fire/Smoke Damper (ZV)
  Blade symbol with "FS" mark — binary open/close, safety interlock
  Category: actuator (safety)
  Ports: input (top) — binary command (open/close from fire panel)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 64 64"
     width="64" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Duct walls -->
    <line x1="4" y1="20" x2="60" y2="20" stroke="#333" stroke-width="2"/>
    <line x1="4" y1="44" x2="60" y2="44" stroke="#333" stroke-width="2"/>
    <!-- Damper blade (closed position — horizontal = closed) -->
    <line x1="20" y1="32" x2="44" y2="32" stroke="#333" stroke-width="3"/>
    <!-- Fusible link symbol (small X on blade) -->
    <line x1="30" y1="28" x2="34" y2="36" stroke="#c62828" stroke-width="1.5"/>
    <line x1="34" y1="28" x2="30" y2="36" stroke="#c62828" stroke-width="1.5"/>
    <!-- "FS" label -->
    <text x="50" y="16" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">FS</text>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="in1" cx="32" cy="16" r="3" fill="#4fc3f7" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="32" y="58" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">FSD-101</text>
  </g>

</svg>
