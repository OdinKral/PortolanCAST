<?xml version="1.0" encoding="UTF-8"?>
<!--
  Variable Air Volume Box (VAV)
  Tapered duct section with damper
  Category: equipment
  Ports: input (left — supply air), output (right — zone), comm (bottom)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 80 64"
     width="80" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Tapered box (wider on supply side, narrower on zone side) -->
    <polygon points="8,14 60,20 60,40 8,46" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Internal damper blade -->
    <line x1="28" y1="18" x2="36" y2="40" stroke="#333" stroke-width="2"/>
    <circle cx="32" cy="29" r="2" fill="#333" stroke="none"/>
    <!-- Reheat coil (optional — small fins) -->
    <line x1="48" y1="22" x2="48" y2="38" stroke="#333" stroke-width="1.5"/>
    <line x1="45" y1="26" x2="51" y2="26" stroke="#333" stroke-width="1"/>
    <line x1="45" y1="30" x2="51" y2="30" stroke="#333" stroke-width="1"/>
    <line x1="45" y1="34" x2="51" y2="34" stroke="#333" stroke-width="1"/>
    <!-- Zone duct out -->
    <line x1="60" y1="30" x2="72" y2="30" stroke="#333" stroke-width="2"/>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="sa-in" cx="4" cy="30" r="3" fill="#4fc3f7" stroke="none"/>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="zone-out" cx="72" cy="30" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="port-comm" inkscape:groupmode="layer" id="layer-port-comm">
    <circle id="comm" cx="34" cy="50" r="3" fill="#ab47bc" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="34" y="60" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">VAV-101</text>
  </g>

</svg>
