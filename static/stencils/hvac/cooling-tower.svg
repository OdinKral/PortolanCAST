<?xml version="1.0" encoding="UTF-8"?>
<!--
  Cooling Tower
  Trapezoid with water spray and fan on top
  Category: equipment
  Ports: input (left — CW return), output (right — CW supply), power (top)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 80 64"
     width="80" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Tower body (trapezoid — wider at top) -->
    <polygon points="16,48 24,12 56,12 64,48" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Fill media lines (horizontal — heat exchange surface) -->
    <line x1="22" y1="24" x2="58" y2="24" stroke="#333" stroke-width="1"/>
    <line x1="20" y1="32" x2="60" y2="32" stroke="#333" stroke-width="1"/>
    <line x1="18" y1="40" x2="62" y2="40" stroke="#333" stroke-width="1"/>
    <!-- Spray nozzles (small downward arrows at top) -->
    <line x1="32" y1="14" x2="32" y2="20" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="40" y1="14" x2="40" y2="20" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="48" y1="14" x2="48" y2="20" stroke="#4fc3f7" stroke-width="1"/>
    <!-- Fan on top -->
    <circle cx="40" cy="8" r="6" fill="none" stroke="#333" stroke-width="1.5"/>
    <path d="M 40,8 Q 43,4 46,6" fill="none" stroke="#333" stroke-width="1"/>
    <path d="M 40,8 Q 37,4 34,6" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="40" cy="8" r="1.5" fill="#333" stroke="none"/>
    <!-- Pipe stubs -->
    <line x1="4" y1="44" x2="18" y2="44" stroke="#333" stroke-width="2"/>
    <line x1="62" y1="44" x2="76" y2="44" stroke="#333" stroke-width="2"/>
  </g>

  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="cwr" cx="4" cy="44" r="3" fill="#4fc3f7" stroke="none"/>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="cws" cx="76" cy="44" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="port-power" inkscape:groupmode="layer" id="layer-port-power">
    <circle id="pwr" cx="56" cy="4" r="3" fill="#e53935" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="40" y="60" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">CT-1</text>
  </g>

</svg>
