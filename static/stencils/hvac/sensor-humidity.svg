<?xml version="1.0" encoding="UTF-8"?>
<!--
  Humidity Sensor (MT)
  ISA-5.1: Circle with "MT" designation (moisture transmitter)
  Category: sensor
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 64 64"
     width="64" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <circle cx="32" cy="28" r="18" fill="none" stroke="#333" stroke-width="2"/>
    <text x="32" y="33" text-anchor="middle" font-family="Arial" font-size="12"
          font-weight="bold" fill="#333">MT</text>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="out" cx="50" cy="28" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="port-power" inkscape:groupmode="layer" id="layer-port-power">
    <circle id="pwr" cx="32" cy="10" r="3" fill="#e53935" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="32" y="58" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">MT-101</text>
  </g>

</svg>
