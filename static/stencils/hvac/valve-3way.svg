<?xml version="1.0" encoding="UTF-8"?>
<!--
  3-Way Control Valve (TV) — mixing/diverting
  ISA-5.1: Bowtie with third port at bottom
  Category: actuator
  Ports: input (top) — command signal, plus three pipe ports
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 64 64"
     width="64" height="64">

  <!-- LAYER: symbol -->
  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Left triangle -->
    <polygon points="8,18 32,30 8,42" fill="none" stroke="#333" stroke-width="2"
             stroke-linejoin="round"/>
    <!-- Right triangle -->
    <polygon points="56,18 32,30 56,42" fill="none" stroke="#333" stroke-width="2"
             stroke-linejoin="round"/>
    <!-- Third port line (bottom — bypass/common) -->
    <line x1="32" y1="30" x2="32" y2="50" stroke="#333" stroke-width="2"/>
    <!-- Third port arrow -->
    <polygon points="28,46 32,50 36,46" fill="#333" stroke="none"/>
    <!-- Stem line up to actuator -->
    <line x1="32" y1="18" x2="32" y2="30" stroke="#333" stroke-width="2"/>
    <!-- Actuator block -->
    <rect x="26" y="8" width="12" height="10" fill="none" stroke="#333" stroke-width="2"/>
  </g>

  <!-- LAYER: port-input — command signal -->
  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="in1" cx="32" cy="4" r="3" fill="#4fc3f7" stroke="none"/>
  </g>

  <!-- LAYER: label -->
  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="32" y="62" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">TV-201</text>
  </g>

</svg>
