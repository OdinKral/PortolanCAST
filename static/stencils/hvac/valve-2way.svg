<?xml version="1.0" encoding="UTF-8"?>
<!--
  2-Way Control Valve (TV)
  ISA-5.1: Bowtie shape — two triangles meeting at center
  Pattern: Valve Command
  Category: actuator
  Ports: input (left) — command signal 0-100%
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 64 64"
     width="64" height="64">

  <!-- LAYER: symbol -->
  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Left triangle (pipe in) -->
    <polygon points="8,16 32,28 8,40" fill="none" stroke="#333" stroke-width="2"
             stroke-linejoin="round"/>
    <!-- Right triangle (pipe out) -->
    <polygon points="56,16 32,28 56,40" fill="none" stroke="#333" stroke-width="2"
             stroke-linejoin="round"/>
    <!-- Stem line (to actuator above) -->
    <line x1="32" y1="16" x2="32" y2="28" stroke="#333" stroke-width="2"/>
    <!-- Actuator block on stem -->
    <rect x="26" y="8" width="12" height="8" fill="none" stroke="#333" stroke-width="2"/>
  </g>

  <!-- LAYER: port-input — command signal from controller -->
  <g inkscape:label="port-input" inkscape:groupmode="layer" id="layer-port-input">
    <circle id="in1" cx="32" cy="4" r="3" fill="#4fc3f7" stroke="none"/>
  </g>

  <!-- LAYER: label -->
  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="32" y="56" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">TV-101</text>
  </g>

</svg>
