<?xml version="1.0" encoding="UTF-8"?>
<!--
  Freeze Stat / Low Limit Thermostat (TSL)
  ISA circle with "TSL" — low limit cutout, safety device
  Category: sensor (binary safety)
  Ports: output (right) — binary alarm/trip
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 64 64"
     width="64" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <!-- Double circle (safety device) -->
    <circle cx="32" cy="28" r="18" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="32" cy="28" r="14" fill="none" stroke="#333" stroke-width="1"/>
    <text x="32" y="32" text-anchor="middle" font-family="Arial" font-size="10"
          font-weight="bold" fill="#333">TSL</text>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="trip" cx="50" cy="28" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="32" y="58" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">TSL-101</text>
  </g>

</svg>
