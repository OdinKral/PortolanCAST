<?xml version="1.0" encoding="UTF-8"?>
<!--
  Current Switch / Current Sensor (IS)
  Circle with lightning bolt — motor run proof
  Category: sensor (binary)
  Ports: output (right) — binary status
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 64 64"
     width="64" height="64">

  <g inkscape:label="symbol" inkscape:groupmode="layer" id="layer-symbol">
    <circle cx="32" cy="28" r="18" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Lightning bolt inside -->
    <path d="M 30,18 L 27,28 L 33,28 L 30,38" fill="none" stroke="#333" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- "IS" label -->
    <text x="40" y="24" font-family="Arial" font-size="8" font-weight="bold" fill="#333">IS</text>
  </g>

  <g inkscape:label="port-output" inkscape:groupmode="layer" id="layer-port-output">
    <circle id="out" cx="50" cy="28" r="3" fill="#ff7043" stroke="none"/>
  </g>

  <g inkscape:label="label" inkscape:groupmode="layer" id="layer-label">
    <text id="label-anchor" x="32" y="58" text-anchor="middle"
          font-family="Arial" font-size="9" fill="#333">IS-101</text>
  </g>

</svg>
