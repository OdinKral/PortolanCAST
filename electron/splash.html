<!DOCTYPE html>
<!--
  PortolanCAST — Splash Screen

  Purpose:
    Displayed in a small frameless window while the Python backend starts.
    Shows the Ship of Theseus brand icon with a loading spinner.
    Automatically closed by main.js once /api/health responds.

  Design: Dark charcoal cockpit aesthetic matching the main app.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PortolanCAST</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #1a1a2e;
        color: #c8c8d4;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        /* Allow dragging the frameless window */
        -webkit-app-region: drag;
        user-select: none;
    }

    .icon {
        width: 96px;
        height: 96px;
        margin-bottom: 24px;
        /* Subtle glow effect around the ship */
        filter: drop-shadow(0 0 12px rgba(74, 158, 255, 0.3));
    }

    .title {
        font-size: 22px;
        font-weight: 600;
        color: #e0e0ec;
        letter-spacing: 1.5px;
        margin-bottom: 8px;
    }

    .subtitle {
        font-size: 12px;
        color: #8888a0;
        margin-bottom: 32px;
    }

    /* CSS-only spinner — no external dependencies needed */
    .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(74, 158, 255, 0.2);
        border-top-color: #4a9eff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .status {
        margin-top: 16px;
        font-size: 11px;
        color: #6666a0;
    }
</style>
</head>
<body>

<!-- Ship of Theseus brand icon (inline SVG — no file dependency) -->
<svg class="icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <polygon points="16,4 21,6 16,7.5" fill="#ffd700"/>
    <line x1="16" y1="4" x2="16" y2="18" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="9" x2="22" y2="9" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M10.5 9.5 L21.5 9.5 L21 16 L11 16 Z" fill="#4a9eff" opacity="0.65"/>
    <rect x="3" y="15" width="7" height="6" rx="1" fill="#4a9eff"/>
    <rect x="8" y="17" width="17" height="4" fill="#4a9eff"/>
    <path d="M23 16 L29 19 L29 21 L23 21 Z" fill="#4a9eff"/>
    <path d="M3 21 Q16 30 29 21 L29 22.5 Q16 31.5 3 22.5 Z" fill="#2d78cc"/>
</svg>

<div class="title">PORTOLANCAST</div>
<div class="subtitle">Plan Markup &amp; Equipment Intelligence</div>
<div class="spinner"></div>
<div class="status">Starting server...</div>

</body>
</html>
